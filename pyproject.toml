[project]
name = "dlna-stream"
version = "0.1.0"
description = "DLNA media server that forwards an internet radio stream to DLNA clients"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "async-upnp-client>=0.47.0",
    "aiohttp>=3.9.0",
]

[project.scripts]
dlna-stream = "dlna_stream.__main__:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["dlna_stream*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
log_cli = true
log_cli_level = "INFO"
